<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Grooming bot — demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet" />
<style>
:root{
  --bg-1:#EDE9F6; --bg-2:#F2ECF4; --bg-3:#FBF1F4;
  --surface:#FFFFFF; --surface-2:#F4F2F9;
  --ink:#181527; --ink-2:#6B6680; --ink-3:#9A95AB;
  --accent:#6A4DF4; --accent-deep:#4734C2;
  --grad:linear-gradient(135deg,#7B5CFF,#4F39D6);
  --teal:#12A594; --coral:#D8553C; --border:#E9E6F1;
  --font-head:'Manrope',system-ui,sans-serif; --font-body:'Inter',system-ui,sans-serif;
}
@media (prefers-color-scheme: dark){
  :root{ --bg-1:#0B0A12; --bg-2:#120F1C; --bg-3:#171221; --surface:#16131F; --surface-2:#211C30;
    --ink:#F4F2FA; --ink-2:#B4AEC6; --ink-3:#7C7690; --accent:#9B8BFF; --accent-deep:#6A4DF4;
    --teal:#2BC4AE; --coral:#F07555; --border:#2A2438; }
}
*{box-sizing:border-box;}
body{margin:0; min-height:100vh; position:relative;
  background:linear-gradient(155deg, var(--bg-1) 0%, var(--bg-2) 55%, var(--bg-3) 100%);
  color:var(--ink); font-family:var(--font-body);
  display:flex; align-items:center; justify-content:center; padding:16px;}
body::before{content:""; position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(40% 34% at 12% 8%, rgba(123,92,255,.30), transparent 62%),
    radial-gradient(36% 30% at 90% 12%, rgba(255,120,190,.26), transparent 62%),
    radial-gradient(42% 36% at 84% 90%, rgba(18,165,148,.22), transparent 62%),
    radial-gradient(38% 32% at 14% 92%, rgba(255,176,120,.22), transparent 62%);}
.app{width:100%; max-width:430px; height:min(700px, calc(100vh - 32px));
  background:var(--surface); border:1px solid var(--border); border-radius:26px;
  box-shadow:0 30px 70px rgba(24,21,39,.22); display:flex; flex-direction:column; overflow:hidden; position:relative; z-index:1;}
.app::before{content:""; position:absolute; inset:0 0 auto 0; height:3px; background:var(--grad);}
.head{display:flex; align-items:center; gap:12px; padding:17px 20px; border-bottom:1px solid var(--border); background:linear-gradient(180deg, rgba(106,77,244,.06), rgba(106,77,244,0));}
.ava{position:relative; width:46px; height:46px; border-radius:15px; background:var(--grad); color:#fff;
  display:flex; align-items:center; justify-content:center; font-family:var(--font-head); font-weight:800; font-size:19px;
  box-shadow:0 6px 16px rgba(106,77,244,.4);}
.ava .live{position:absolute; right:-2px; bottom:-2px; width:13px; height:13px; border-radius:50%;
  background:var(--teal); border:2.5px solid var(--surface);}
.ava .live::after{content:""; position:absolute; inset:-3px; border-radius:50%; border:2px solid var(--teal);
  opacity:.6; animation:pulse 1.8s ease-out infinite;}
@keyframes pulse{0%{transform:scale(.7);opacity:.7;}100%{transform:scale(1.6);opacity:0;}}
.head .name{font-family:var(--font-head); font-weight:700; font-size:16.5px; letter-spacing:-.01em;}
.head .status{font-size:12.5px; color:var(--ink-2); display:flex; align-items:center; gap:6px;}
.head .status b{width:6px; height:6px; border-radius:50%; background:var(--teal); display:inline-block;}
.log{flex:1; overflow-y:auto; padding:20px 18px 8px; display:flex; flex-direction:column; gap:4px;}
.row{display:flex; flex-direction:column; max-width:86%; margin-bottom:8px; animation:rise .32s cubic-bezier(.2,.8,.2,1) both;}
.row.bot{align-self:flex-start; align-items:flex-start;}
.row.user{align-self:flex-end; align-items:flex-end;}
@keyframes rise{from{opacity:0; transform:translateY(8px);}to{opacity:1; transform:translateY(0);}}
.b{padding:11px 15px; font-size:15px; line-height:1.45; white-space:pre-line; border-radius:18px;}
.row.bot .b{background:var(--surface-2); color:var(--ink); border-bottom-left-radius:5px;}
.row.user .b{background:var(--grad); color:#fff; border-bottom-right-radius:5px; box-shadow:0 6px 16px rgba(106,77,244,.28);}
.time{font-size:11px; color:var(--ink-3); margin:3px 6px 0;}
.note{align-self:center; max-width:94%; text-align:center; font-size:12.5px; color:var(--ink-2);
  background:var(--surface-2); padding:8px 14px; border-radius:12px; margin:6px 0 10px; animation:rise .32s both;}
.typing{align-self:flex-start; background:var(--surface-2); border-radius:18px; border-bottom-left-radius:5px;
  padding:13px 16px; display:flex; gap:5px; margin-bottom:8px; animation:rise .25s both;}
.typing i{width:7px; height:7px; border-radius:50%; background:var(--ink-3); animation:blink 1.2s infinite both;}
.typing i:nth-child(2){animation-delay:.18s;} .typing i:nth-child(3){animation-delay:.36s;}
@keyframes blink{0%,80%,100%{opacity:.25; transform:translateY(0);}40%{opacity:1; transform:translateY(-3px);}}
.chips{display:grid; grid-template-columns:1fr 1fr; gap:8px; padding:6px 18px 12px;}
.chip{font-family:var(--font-body); font-weight:500; font-size:14px; padding:11px 12px; border-radius:14px; cursor:pointer;
  background:var(--surface); color:var(--ink); border:1.5px solid var(--border); transition:.14s ease;
  text-align:center; display:flex; align-items:center; justify-content:center; min-height:46px; line-height:1.25;}
.chip:hover{border-color:var(--accent); color:var(--accent-deep); transform:translateY(-1px);}
.chip.primary{grid-column:1 / -1; background:var(--grad); color:#fff; border:none; box-shadow:0 8px 20px rgba(106,77,244,.35);}
.chip.primary:hover{color:#fff; transform:translateY(-2px);}
.inputbar{display:none; gap:10px; padding:13px 16px; border-top:1px solid var(--border); background:var(--surface);}
.inputbar.on{display:flex;}
.inputbar input{flex:1; font-family:var(--font-body); font-size:15px; color:var(--ink);
  background:var(--surface-2); border:1.5px solid transparent; border-radius:14px; padding:13px 15px;}
.inputbar input:focus{outline:none; border-color:var(--accent); background:var(--surface);}
.inputbar button{border:none; cursor:pointer; width:48px; border-radius:14px; color:#fff; background:var(--grad);
  display:flex; align-items:center; justify-content:center; transition:transform .12s;}
.inputbar button:active{transform:scale(.94);}
.log::-webkit-scrollbar{width:6px;} .log::-webkit-scrollbar-thumb{background:var(--border); border-radius:6px;}
@media (prefers-reduced-motion: reduce){ *{animation:none!important; transition:none!important;} }
</style>
</head>
<body>
<div class="app">
  <div class="head">
    <span class="ava" id="ava"><svg width="24" height="24" viewBox="0 0 32 32" fill="#fff" aria-hidden="true"><ellipse cx="16" cy="21" rx="6.2" ry="5.2"/><circle cx="8.7" cy="13.5" r="2.5"/><circle cx="13.4" cy="9.6" r="2.7"/><circle cx="18.6" cy="9.6" r="2.7"/><circle cx="23.3" cy="13.5" r="2.5"/></svg><span class="live"></span></span>
    <div>
      <div class="name" id="bizName">Waggy Grooming Studio</div>
      <div class="status"><b></b> booking 24/7</div>
    </div>
  </div>
  <div class="log" id="log"></div>
  <div class="chips" id="chips"></div>
  <form class="inputbar" id="bar">
    <input id="inp" type="text" placeholder="Type your answer…" autocomplete="off" aria-label="Your answer" />
    <button type="button" id="send" aria-label="Send">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10l15-6-6 15-2-6z"/></svg>
    </button>
  </form>
</div>

<script>
/* =====================================================================
   GROOMING STUDIO CONFIG — edit only this block.
   Name, services, sizes (they set the price), working hours.
   ===================================================================== */
const CONFIG = {
  name: "Waggy Grooming Studio",
  petTypes: ["Dog", "Cat"],
  services: [
    { name:"Full package" },     // bath + trim + nails + ears
    { name:"Hygiene trim" },
    { name:"Bath & blow-dry" },
    { name:"Hand stripping" },
    { name:"Nails & ears" },
    { name:"Gift certificate", type:"gift", prompt:"What value should the certificate be?", amounts:[1500, 3000, 5000] },
  ],
  // price depends on pet size
  sizes: [
    { name:"Small (up to 5 kg)",   prices:{ "Full package":2500, "Hygiene trim":1500, "Bath & blow-dry":1200, "Hand stripping":2000, "Nails & ears":600 } },
    { name:"Medium (5–15 kg)",  prices:{ "Full package":3500, "Hygiene trim":2200, "Bath & blow-dry":1800, "Hand stripping":2800, "Nails & ears":700 } },
    { name:"Large (15 kg+)", prices:{ "Full package":4800, "Hygiene trim":3000, "Bath & blow-dry":2500, "Hand stripping":3800, "Nails & ears":800 } },
  ],
  openHour: 10,     // opening hour
  closeHour: 20,    // closing hour
  stepMinutes: 90,  // step between booking slots
};

const log = document.getElementById('log');
const chips = document.getElementById('chips');
const bar = document.getElementById('bar');
const inp = document.getElementById('inp');
let S = { stage: 'service' };

document.getElementById('bizName').textContent = CONFIG.name;

function nowTime(){
  const d = new Date();
  return (d.getHours() < 10 ? '0' : '') + d.getHours() + ':' + (d.getMinutes() < 10 ? '0' : '') + d.getMinutes();
}
function down(){ log.scrollTop = log.scrollHeight; }

function addBubble(text, who){
  const row = document.createElement('div');
  row.className = 'row ' + who;
  row.innerHTML = '<div class="b"></div><span class="time">' + nowTime() + '</span>';
  row.querySelector('.b').textContent = text;
  log.appendChild(row); down();
}
function note(text){
  const d = document.createElement('div');
  d.className = 'note'; d.textContent = text;
  log.appendChild(d); down();
}
function user(text){ addBubble(text, 'user'); }

function bot(text, cb){
  const t = document.createElement('div');
  t.className = 'typing'; t.innerHTML = '<i></i><i></i><i></i>';
  log.appendChild(t); down();
  setTimeout(() => { t.remove(); addBubble(text, 'bot'); if(cb) cb(); }, 600);
}

function setChips(items, onPick, primaryLast){
  chips.innerHTML = ''; bar.classList.remove('on');
  items.forEach((label, i) => {
    const b = document.createElement('button');
    b.type = 'button';
    b.className = 'chip' + (primaryLast && i === items.length - 1 ? ' primary' : '');
    b.textContent = label;
    b.onclick = () => { chips.innerHTML = ''; onPick(label); };
    chips.appendChild(b);
  });
}
function askText(placeholder){
  chips.innerHTML = ''; bar.classList.add('on');
  inp.value = ''; inp.placeholder = placeholder; inp.focus();
}

function buildDays(){
  const dn = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const mn = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const now = new Date(); const out = [];
  for(let i = 0; i < 5; i++){
    const dt = new Date(now.getFullYear(), now.getMonth(), now.getDate() + i);
    out.push(i === 0 ? "Today" : i === 1 ? "Tomorrow" : (dn[dt.getDay()] + ", " + dt.getDate() + " " + mn[dt.getMonth()]));
  }
  return out;
}
function buildTimes(){
  const out = []; let m = CONFIG.openHour * 60;
  while(m <= CONFIG.closeHour * 60){
    const h = Math.floor(m / 60), mm = m % 60;
    out.push((h < 10 ? "0" : "") + h + ":" + (mm < 10 ? "0" : "") + mm);
    m += CONFIG.stepMinutes;
  }
  return out;
}
function fmt(n){ return n.toLocaleString('ru-RU') + ' ₽'; }
function priceFor(sizeName, key){
  const s = CONFIG.sizes.find(x => x.name === sizeName);
  return s && typeof s.prices[key] === 'number' ? s.prices[key] : null;
}

function start(){
  S = { stage: 'service' };
  bot("Hello! This is " + CONFIG.name + ". I'll book your pet in a minute.\nChoose a service.",
      () => setChips(CONFIG.services.map(s => s.name), pickService));
}
function pickService(label){
  user(label);
  const svc = CONFIG.services.find(s => s.name === label);
  if(svc && svc.type === 'gift'){
    S.isGift = true; S.service = svc.name; S.stage = 'amount';
    bot(svc.prompt || "What value should the certificate be?",
        () => setChips(svc.amounts.map(fmt), pickAmount));
  } else {
    S.service = label; S.priceKey = label; askPet();
  }
}
function pickAmount(label){
  user(label);
  const n = parseInt(label.replace(/\D/g, ''), 10);
  S.amount = n; S.price = fmt(n);
  askName();
}
function askPet(){
  S.stage = 'pet';
  bot("Who's coming to see us?",
      () => setChips(CONFIG.petTypes, v => { user(v); S.pet = v; askSize(); }));
}
function askSize(){
  S.stage = 'size';
  bot("What size is your pet?\nThe price depends on it.",
      () => {
        const labels = CONFIG.sizes.map(s => {
          const p = s.prices[S.priceKey];
          return typeof p === 'number' ? (s.name + " · from " + fmt(p)) : s.name;
        });
        setChips(labels, pickSize);
      });
}
function pickSize(label){
  user(label);
  const name = label.split(" · ")[0];
  S.size = name;
  const p = priceFor(name, S.priceKey);
  S.price = (p != null) ? ("from " + fmt(p)) : null;
  askDay();
}
function askDay(){
  S.stage = 'day';
  bot("Which day works for you?",
      () => setChips(buildDays(), v => { user(v); S.day = v; askTime(); }));
}
function askTime(){
  S.stage = 'time';
  bot("What time suits you?",
      () => setChips(buildTimes(), v => { user(v); S.time = v; askName(); }));
}
function askName(){
  S.stage = 'name';
  bot("What's your name?", () => askText("Your name"));
}
function askPetName(){
  S.stage = 'petname';
  bot("And your pet's name?", () => askText("Pet's name"));
}
function askPhone(){
  S.stage = 'phone';
  bot("And a phone number to confirm the booking:", () => askText("+7 900 000-00-00"));
}
function finish(){
  let summary;
  if(S.isGift){
    summary = "Done! Gift certificate created ✅\n\n• Gift certificate" +
      "\n• Value: " + S.price +
      "\n• Name: " + S.name +
      "\n• Phone: " + S.phone +
      "\n\nWe'll contact you to hand over the certificate. Thank you!";
  } else {
    summary = "Done! You're booked ✅\n\n• Pet: " + S.pet + (S.petName ? (", " + S.petName) : "") +
      "\n• Service: " + S.service +
      "\n• Size: " + S.size +
      (S.price ? ("\n• Price: " + S.price) : "") +
      "\n• When: " + S.day + ", " + S.time +
      "\n• Owner: " + S.name +
      "\n• Phone: " + S.phone +
      "\n\nWe can't wait to see you! We'll remind you the day before.";
  }
  bot(summary, () => {
    note("This is a demo. In a live bot, this request instantly reaches the owner on Telegram.");
    S.stage = 'done';
    setChips(["Book another"], () => { log.innerHTML = ''; start(); }, true);
  });
}

function submitAnswer(){
  const v = inp.value.trim();
  if(S.stage === 'name'){
    if(v.length < 2){ bot("Please type your name so I can book you in."); return; }
    user(v); S.name = v; inp.value = '';
    if(S.isGift) askPhone(); else askPetName();
    return;
  }
  if(S.stage === 'petname'){
    if(v.length < 1){ bot("Please type your pet's name."); return; }
    user(v); S.petName = v; inp.value = ''; askPhone(); return;
  }
  if(S.stage === 'phone'){
    const digits = v.replace(/\D/g, '');
    if(digits.length < 10){ bot("That number looks short. Please enter a phone like +7 900 000-00-00."); return; }
    user(v); S.phone = v; inp.value = ''; finish(); return;
  }
}
bar.addEventListener('submit', e => { e.preventDefault(); submitAnswer(); });
inp.addEventListener('keydown', e => { if(e.key === 'Enter'){ e.preventDefault(); submitAnswer(); } });
document.getElementById('send').addEventListener('click', submitAnswer);

start();
</script>
</body>
</html>
